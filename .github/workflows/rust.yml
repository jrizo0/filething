name: Rust

# Corre en cada PR y solo en push directo a main (tras el merge).
# Ya NO corre en cada push a ramas de feature: eso duplicaba las corridas
# (una por el push + otra por el PR) y quemaba minutos de Actions.
#
# El filtro `paths` hace que un cambio de docs o del backend NO arranque
# este workflow: no se levanta runner, cero minutos.
on:
  pull_request:
    paths:
      - 'crates/**'
      - 'apps/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'apps/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

# Cancel superseded runs on the same ref.
concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust workspace: format, lint (clippy as hard errors), test.
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features
