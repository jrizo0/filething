# filething — local infra (Vault + Coordinator).
#
# Vault       = MinIO (S3-compatible) — the data plane that holds Blocks.
# Coordinator = Convex backend self-hosted — the control plane (Space head,
#               Revision chain, change feed). Plus an optional dashboard.
#
# Everything here is local-dev only. Copy infra/.env.example -> infra/.env first.
# Switch to managed infra (Cloudflare R2 + Convex cloud) by changing only the
# env vars the Rust client reads (S3_* and CONVEX_URL) — no code changes.

name: filething

services:
  # ---------------------------------------------------------------------------
  # Vault — MinIO. API on :9000, web console on :9001.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3 API (ft-vault S3 backend)
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # Coordinator — Convex backend self-hosted.
  #   :3210 = client/CLI API (CONVEX_URL)   :3211 = HTTP actions / site proxy
  # ---------------------------------------------------------------------------
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    ports:
      - "${CONVEX_BACKEND_PORT:-3210}:3210" # API the Rust ft-coordinator talks to
      - "${CONVEX_SITE_PORT:-3211}:3211" # HTTP actions / site proxy
    environment:
      INSTANCE_NAME: filething-local
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET}
      # URLs the backend advertises to clients and the dashboard.
      CONVEX_CLOUD_ORIGIN: ${CONVEX_URL:-http://localhost:3210}
      CONVEX_SITE_ORIGIN: http://localhost:${CONVEX_SITE_PORT:-3211}
      # Allow the dashboard origin to call the backend in dev.
      DISABLE_BEACON: "true"
      REDACT_LOGS_TO_CLIENT: "false"
    volumes:
      - convex_data:/convex/data
    healthcheck:
      # Forma exec (CMD): sin shell, así que un "|| exit 1" serían argumentos
      # literales para curl (el bug que tenía al contenedor "unhealthy" para
      # siempre). curl -f ya sale con código != 0 si el HTTP falla.
      test: ["CMD", "curl", "-fsS", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # Convex dashboard (optional) — web UI for the local backend, on :6791.
  # ---------------------------------------------------------------------------
  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    ports:
      - "${CONVEX_DASHBOARD_PORT:-6791}:6791"
    environment:
      # The dashboard (running in the browser) reaches the backend on the host.
      NEXT_PUBLIC_DEPLOYMENT_URL: ${CONVEX_URL:-http://localhost:3210}
    depends_on:
      - convex-backend

volumes:
  minio_data:
  convex_data:
